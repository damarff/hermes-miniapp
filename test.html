<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test</title>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        .ok { color: green; }
        .err { color: red; }
    </style>
</head>
<body>
    <h1>Test Page</h1>
    <div id="result">Loading...</div>
    
    <script>
        const result = document.getElementById('result');
        
        // Test 1: Basic JS works
        result.innerHTML += '<p>✅ JavaScript running</p>';
        
        // Test 2: Check Telegram
        if (window.Telegram) {
            result.innerHTML += '<p>✅ window.Telegram exists</p>';
            if (window.Telegram.WebApp) {
                result.innerHTML += '<p>✅ WebApp exists</p>';
                result.innerHTML += '<p>Platform: ' + window.Telegram.WebApp.platform + '</p>';
                window.Telegram.WebApp.ready();
            } else {
                result.innerHTML += '<p class="err">❌ WebApp not found</p>';
            }
        } else {
            result.innerHTML += '<p class="err">❌ window.Telegram not found</p>';
        }
    </script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
        // Check again after script load
        if (window.Telegram && window.Telegram.WebApp) {
            result.innerHTML += '<p>✅ After external script: WebApp exists</p>';
        } else {
            result.innerHTML += '<p class="err">❌ External script did not load Telegram</p>';
        }
    </script>
</body>
</html>
